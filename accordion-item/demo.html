<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accordion Item</title>
  <link rel="stylesheet" href="/accordion-item/accordion-item.css">
</head>

<body>
  <h1>Accordion Item</h1>

  <accordion-item class="accordion-item">
   <button
      type="button"
      class="accordion-item__head"
      id="Button-Title"
      aria-expanded="false"
      aria-controls="Title"
      js-toggle
    >
      Title
    </button>
    <!-- /.accordion-item__head -->

    <div
      class="accordion-item__body"
      id="Title"
      aria-labelledby="Button-Title"
      aria-hidden="true"
      role="region"
      js-toggle-target
    >
      <div class="accordion-item__body-inner">
        Accordion Content
      </div>
      <!-- /.accordion-item__body-inner -->
    </div>
    <!-- /.accordion-item__body -->
  </accordion-item>

  <script src="/accordion-item/accordion-item.js"></script>
</body>

</html>
